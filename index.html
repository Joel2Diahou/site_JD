<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💖 Pour toi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  overflow:hidden;
  font-family:Arial;
}

/* 🌸 START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:100;
  color:white;
}

#flowersVideo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
  z-index:-1;
}

#startBtn{
  padding:14px 22px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-size:16px;
}

/* 🎥 VIDEO */
#bg-video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  z-index:-3;
  filter:brightness(0.45);
}

/* 🔁 RESTART */
#restart{
  position:fixed;
  top:10px;
  left:10px;
  z-index:999;
  display:none;
  padding:8px 12px;
  border:none;
  border-radius:15px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
}

/* 💖 CARD */
.card{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:380px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:18px;
  text-align:center;
  color:white;
  display:none;
  z-index:10;
}

/* 📸 PHOTO PLUS GRANDE */
.photo{
  width:280px;
  height:280px;
  object-fit:cover;
  border-radius:25px;
  margin:15px auto;
  border:4px solid white;
  box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

/* boutons */
button{
  margin-top:12px;
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4d6d;
  font-size:16px;
}

/* ❤️ hearts */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

/* 🎆 FEU D’ARTIFICE */
canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
  z-index:5;
}

/* ❤️ BOUTON JE T’AIME (FORCÉ VISIBLE) */
#loveBtn{
  display:none;
  margin-top:15px;
  padding:14px 20px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-size:18px;
  font-weight:bold;
  z-index:9999;
  position:relative;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* 💌 FINAL SCREEN */
#loveScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#ff4d6d,#3a0010);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  color:white;
  font-size:2em;
  z-index:300;
  padding:20px;
}
</style>
</head>

<body>

<!-- 🌸 START -->
<div id="startScreen">
  <video autoplay muted loop playsinline id="flowersVideo">
    <source src="flowers.mp4" type="video/mp4">
  </video>

  <h2>🌸 Une surprise t’attend</h2>
  <button id="startBtn" onclick="start()">Commencer</button>
</div>

<!-- 🎥 BACKGROUND -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="background.mp4" type="video/mp4">
</video>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<button id="restart" onclick="restart()">🔁</button>

<canvas id="fireworks"></canvas>

<!-- 💖 CARD -->
<div class="card" id="card">

  <h2>💖 Pour toi</h2>

  <img src="photo.jpg" class="photo">

  <div id="text"></div>

  <button onclick="next()" id="nextBtn">Suivant ➜</button>

  <button id="loveBtn" onclick="finalLove()">❤️ JE T’AIME</button>

</div>

<!-- 💌 FINAL -->
<div id="loveScreen">
  ❤️ JE T’AIME AUSSI<br><br>
  TU ES MON ÉPOUSE ET MON AMOUR 💖
</div>

<script>

const messages=[
"Je ne sais pas comment te dire ça…",
"Mais tu es incroyable ❤️",
"Chaque moment avec toi est précieux",
"Tu rends ma vie meilleure 🌹",
"Et je voulais te le dire 💖"
];

let i=0;

/* ▶️ START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("card").style.display="block";
  document.getElementById("bg-video").style.display="block";
  document.getElementById("restart").style.display="block";

  document.getElementById("music").play().catch(()=>{});

  show();
}

/* 📖 texte */
function show(){
  document.getElementById("text").innerHTML=messages[i];
}

/* ➜ next */
function next(){
  i++;

  if(i<messages.length){
    show();
  }else{
    document.getElementById("text").innerHTML="💖 C’est fini...";
    document.getElementById("nextBtn").style.display="none";

    startFireworks();

    /* 🔥 BOUTON GARANTI VISIBLE */
    setTimeout(()=>{
      const btn=document.getElementById("loveBtn");
      btn.style.display="block";
      btn.style.position="relative";
      btn.style.zIndex="9999";
    },1500);
  }
}

/* 💌 FINAL */
function finalLove(){
  document.getElementById("loveScreen").style.display="flex";
  startFireworks();
}

/* 🔁 restart */
function restart(){
  location.reload();
}

/* ❤️ hearts */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);

/* 🎆 FIREWORKS */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function P(x,y){
  this.x=x;
  this.y=y;
  this.vx=(Math.random()-0.5)*8;
  this.vy=(Math.random()-0.5)*8;
  this.alpha=1;
  this.size=Math.random()*3+2;
  this.color=`hsl(${Math.random()*360},100%,60%)`;
}

function startFireworks(){
  for(let k=0;k<200;k++){
    particles.push(new P(innerWidth/2,innerHeight/2));
  }
  animate();
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.alpha-=0.008;

    ctx.globalAlpha=p.alpha;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();

    if(p.alpha<=0)particles.splice(i,1);
  });

  if(particles.length>0)requestAnimationFrame(animate);
}

</script>

</body>
</html>
